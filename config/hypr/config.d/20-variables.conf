# ==== VARIABLES ====
# These file configures most of the variables.

# Modifier keys
$mod = SUPER

# Directories
$hypr-dir   = $XDG_CONFIG_HOME/hypr

# Keychron
$kc-circle   = XF86Tools
$kc-triangle = XF86Launch5
$kc-square   = XF86Launch6
$kc-cross    = XF86Launch7

# Directional keys
$left  = left
$right = right
$up    = up
$down  = down

# Applications
$term     = kitty
$editor   = subl
$fm       = thunar
$browser  = vivaldi
$audio    = pavucontrol
$scns     = grim
$menu     = quickshell ipc call launcher toggle
$power    = quickshell ipc call power toggle

# VLX
$vlx-themes = vlx themes
$vlx-pkg = vlx pkg