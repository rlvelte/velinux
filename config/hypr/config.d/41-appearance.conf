# ==== APPEARANCE ====
# This file configures the styling.

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 3

    col.active_border = $primary
    col.inactive_border = $surface0
}

decoration {
    rounding = 12

    blur {
        enabled = true
        size = 8
        passes = 2
        vibrancy = 0.2
        popups = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3

        color = $base
        color_inactive = $mantle
    }

    active_opacity = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0
}

animations {
    enabled = true

    bezier = snappy,  0.4, 1.2, 0.6, 1.0 
    bezier = linear,  0.0, 0.0, 1.0, 1.0
    bezier = easeOut, 0.0, 0.0, 0.2, 1.0

    animation = windows,     1, 3, snappy,  slide
    animation = windowsOut,  1, 2, easeOut, slide
    animation = border,      1, 4, snappy
    animation = fade,        1, 3, easeOut
    animation = workspaces,  1, 3, snappy,  slide
}

misc {
    disable_hyprland_logo = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    vfr = true
    vrr = 0
}

group {
    col.border_active = $primary
    col.border_inactive = $surface0

    groupbar {
        font_size = 11
        gradients = true
        render_titles = true
    }
}

# Cursor
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24