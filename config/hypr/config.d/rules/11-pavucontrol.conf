# ==== PAVUCONTROL WINDOW RULES ====
# Floating window with fixed width and top-left position

windowrule = float on, match:title .*(Lautstärkeregler|Volume Control).*
windowrule = size 635 400, match:title .*(Lautstärkeregler|Volume Control).*
windowrule = move 2583 50, match:title .*(Lautstärkeregler|Volume Control).*