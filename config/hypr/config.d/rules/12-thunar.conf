# ==== THUNAR WINDOW RULES ====
# Floating windows for all dialogs

windowrule = float on, match:title .*(umbenennen|Rename).*
windowrule = size 400 200, match:title .*(umbenennen|Rename).*
windowrule = float on, match:title .*(Speichern|Save).*
windowrule = size 400 200, match:title .*(Speichern|Save).*
windowrule = float on, match:title .*(Öffnen|Open).*
windowrule = size 400 200, match:title .*(Öffnen|Open).*