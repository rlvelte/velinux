# ==== THUNAR WINDOW RULES ====
# Floating windows for all dialogs

windowrule = float on, match:title .*umbenennen.*
windowrule = size 400 200, match:title .*umbenennen.*
windowrule = float on, match:title .*Speichern.*
windowrule = size 400 200, match:title .*Speichern.*
windowrule = float on, match:title .*Öffnen.*
windowrule = size 400 200, match:title .*Öffnen.*