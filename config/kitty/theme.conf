
# Kitty theme - generated by vlx-themes

# --- Core colors ---
background #080f0e
foreground #e0f0ee
selection_background #254d43
selection_foreground #e0f0ee

# --- Cursor ---
cursor #fe7c3f
cursor_text_color #080f0e
cursor_shape beam

# --- URL ---
url_color #fe7c3f
url_style curly

# --- Window borders ---
active_border_color #30ba78
inactive_border_color #254d43
bell_border_color #f0ab00

# --- Tab bar ---
active_tab_background #30ba78
active_tab_foreground #060f0d
inactive_tab_background #1a3d35
inactive_tab_foreground #a8c8c2
tab_bar_background #0c1a17
tab_bar_style powerline
tab_powerline_style slanted

# --- Window title ---
wayland_titlebar_color #080f0e

# --- The 16 terminal colors ---

# Black
;color0 #080f0e
color0 #0f2822
color8 #254d43

# Red
color1 #e85b4a
color9 #e85b4a

# Green
color2 #30ba78
color10 #30ba78

# Yellow
color3 #f0ab00
color11 #f0ab00

# Blue
color4 #30ba78
color12 #1d8a54

# Magenta
color5 #fe7c3f
color13 #ffb184

# Cyan
color6 #00b2e2
color14 #b3e8f6

# White
color7 #a8c8c2
color15 #e0f0ee

# --- Extended colors ---
mark1_foreground #080f0e
mark1_background #30ba78

mark2_foreground #080f0e
mark2_background #0c322c

mark3_foreground #080f0e
mark3_background #fe7c3f

# --- Notifications ---
enable_audio_bell no
visual_bell_duration 0.0
visual_bell_color #ffecb5

# --- Performance ---
repaint_delay 10
input_delay 3
sync_to_monitor yes
