# ==== APPEARANCE ====
# Mango mirror of hypr appearance config

# --- Gaps & Borders ---
gappih=5
gappiv=5
gappoh=5
gappov=5
borderpx=3
border_radius=12

# --- Blur ---
blur=1
blur_layer=1
blur_optimized=1
blur_params_radius=8
blur_params_num_passes=2
blur_params_noise=0.02
blur_params_brightness=0.9
blur_params_contrast=0.9
blur_params_saturation=1.2

# --- Shadows ---
shadows=1
layer_shadows=1
shadow_only_floating=1
shadows_size=20
shadows_blur=15
shadows_position_x=0
shadows_position_y=0
shadowscolor=0x080f0eff

# --- Opacity ---
focused_opacity=1.0
unfocused_opacity=0.92

# --- Animations ---
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide
layer_animation_type_open=slide
layer_animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.7
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.5
animation_duration_move=200
animation_duration_open=150
animation_duration_tag=150
animation_duration_close=100
animation_duration_focus=0
animation_curve_open=0.5,1.0,0.5,1.0
animation_curve_move=0.5,1.0,0.5,1.0
animation_curve_tag=0.5,1.0,0.5,1.0
animation_curve_close=0.2,0.0,0.4,1.0
animation_curve_focus=0.5,1.0,0.5,1.0

# --- Cursor ---
cursor_size=24
cursor_theme=Adwaita
