# ==== BINDING APPLICATION ====
# This file configures bindings for applications.

# Applications
bind=SUPER,k,spawn,kitty
bind=SUPER,f,spawn,firefox
bind=SUPER,e,spawn,thunar
bind=SUPER,s,spawn,subl
bind=SUPER,Space,spawn,rofi -show drun

# VLX
bind=SUPER,t,spawn,vlx themes apply

# Scripts
bind=SUPER,l,spawn_shell,bash ~/.config/rofi/scripts.d/select-power.sh
