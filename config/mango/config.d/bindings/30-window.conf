# ==== BINDING WINDOW ====
# This file configures bindings for windows.

# Floating modifier (mouse)
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
bind=SUPER,Return,togglefloating

# Window operations
bind=SUPER,q,killclient

# Focus
bind=SUPER,left,focusdir,left
bind=SUPER,down,focusdir,down
bind=SUPER,up,focusdir,up
bind=SUPER,right,focusdir,right

# Move windows (exchange in layout)
bind=SUPER+SHIFT,left,exchange_client,left
bind=SUPER+SHIFT,down,exchange_client,down
bind=SUPER+SHIFT,up,exchange_client,up
bind=SUPER+SHIFT,right,exchange_client,right

# Resize mode
keymode=resize
bind=NONE,left,resizewin,-50,0
bind=NONE,down,resizewin,0,50
bind=NONE,up,resizewin,0,-50
bind=NONE,right,resizewin,50,0
bind=NONE,Return,setkeymode,default
bind=NONE,Escape,setkeymode,default
bind=SUPER,r,setkeymode,default

keymode=default
bind=SUPER,r,setkeymode,resize

# Scratchpad
bind=SUPER,minus,minimized
bind=SUPER,plus,toggle_scratchpad
