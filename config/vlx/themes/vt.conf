#                            Themes by rlvelte

[theme]
icon=
id=vt
name=VTraffic
wallpaper=wallpapers/vt.png

# --- Identity ---
color_primary=#fd7803
color_primary_dim=#ac5323
color_primary_subtle=#d46202
color_primary_muted=#fcd4a8

color_secondary=#003562
color_secondary_dim=#021b2f
color_secondary_light=#0a4a7a

color_accent=#00aaff
color_accent_dim=#0077cc
