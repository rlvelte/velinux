# ==== THUNAR WINDOW RULES ====
# Floating windows for all dialogs

for_window [title=".*umbenennen.*"] floating enable
for_window [title=".*umbenennen.*"] resize set 400 200
for_window [title=".*Speichern.*"] floating enable
for_window [title=".*Speichern.*"] resize set 400 200
for_window [title=".*Öffnen.*"] floating enable
for_window [title=".*Öffnen.*"] resize set 400 200
