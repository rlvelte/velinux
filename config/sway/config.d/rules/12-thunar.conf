# ==== THUNAR WINDOW RULES ====
# Floating windows for all dialogs

for_window [title=".*(umbenennen|Rename).*" app_id="thunar"] floating enable
for_window [title=".*(umbenennen|Rename).*" app_id="thunar"] resize set 400 200
for_window [title=".*(Speichern|Save).*" app_id="thunar"] floating enable
for_window [title=".*(Speichern|Save).*" app_id="thunar"] resize set 400 200
for_window [title=".*(Öffnen|Open).*" app_id="thunar"] floating enable
for_window [title=".*(Öffnen|Open).*" app_id="thunar"] resize set 400 200
